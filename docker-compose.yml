version: '3.8'

services:
  # 1. DATABASE CONTAINER
  database:
    image: mysql:8.0
    container_name: devops_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. BACKEND CONTAINER
  backend:
    build: ./backend
    container_name: devops_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=devops_db
      - APP_NAME=DevOpsMiniProject_Khang
    depends_on:
      - database

  # 3. FRONTEND CONTAINER
  frontend:
    build: ./frontend
    container_name: devops_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data: