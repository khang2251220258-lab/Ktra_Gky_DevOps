<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps App - Trang chủ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        input {
            display: block;
            width: 95%;
            margin-bottom: 10px;
            padding: 8px;
        }

        button {
            padding: 10px 15px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f4f4f4;
            margin: 5px 0;
            padding: 10px;
            border-radius: 4px;
        }

        .student-link {
            color: #174ea6;
            text-decoration: none;
            font-weight: 600;
        }

        .student-link:hover {
            text-decoration: underline;
        }

        .delete-btn {
            margin-left: 10px;
            padding: 6px 10px;
            background: #d32f2f;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #b71c1c;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            min-height: 20px;
        }

        .ok {
            color: #0f7a2a;
        }

        .error {
            color: #c62828;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Quản lý Sinh Viên</h2>
        <a href="about.html">Chuyển đến trang Thông tin sinh viên (/about)</a>
        <hr>

        <h3>Thêm Sinh Viên Mới</h3>
        <form id="userForm">
            <input type="text" id="name" placeholder="Họ và tên" required>
            <input type="text" id="studentId" placeholder="Mã số sinh viên" required>
            <input type="text" id="className" placeholder="Lớp (ví dụ: IT01)" required>
            <button type="submit">Thêm Sinh Viên</button>
        </form>
        <p id="status" class="status"></p>

        <h3>Danh sách Sinh Viên (từ Database)</h3>
        <ul id="userList"></ul>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/users';
        const statusEl = document.getElementById('status');

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.className = `status ${isError ? 'error' : 'ok'}`;
        }

        // Lấy dữ liệu từ Backend
        async function fetchUsers() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) {
                    throw new Error('Không thể tải danh sách sinh viên từ backend.');
                }
                const users = await res.json();
                const list = document.getElementById('userList');
                list.innerHTML = '';
                users.forEach(user => {
                    const item = document.createElement('li');
                    const detailUrl = `about.html?id=${encodeURIComponent(user.id)}`;
                    item.innerHTML = `
                        <a class="student-link" href="${detailUrl}">${user.name}</a>
                        - MSSV: ${user.studentId}
                        ${user.className ? `- Lớp: ${user.className}` : ''}
                        <button class="delete-btn" data-id="${user.id}" type="button">Xóa</button>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                console.error("Lỗi khi tải dữ liệu:", error);
                setStatus(error.message || 'Lỗi khi tải dữ liệu.', true);
            }
        }

        // Gửi dữ liệu lên Backend
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const studentId = document.getElementById('studentId').value;
            const className = document.getElementById('className').value;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, studentId, className })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || 'Thêm sinh viên thất bại.');
                }

                document.getElementById('name').value = '';
                document.getElementById('studentId').value = '';
                document.getElementById('className').value = '';
                setStatus('Thêm sinh viên thành công.');
                fetchUsers(); // Cập nhật lại danh sách
            } catch (error) {
                console.error("Lỗi khi thêm sinh viên:", error);
                setStatus(error.message || 'Lỗi khi thêm sinh viên.', true);
            }
        });

        // Xóa sinh viên khi bấm nút Xóa trong danh sách
        document.getElementById('userList').addEventListener('click', async (e) => {
            const target = e.target;
            if (!target.classList.contains('delete-btn')) {
                return;
            }

            const id = target.getAttribute('data-id');
            if (!id) {
                return;
            }

            const confirmed = window.confirm('Bạn có chắc chắn muốn xóa sinh viên này không?');
            if (!confirmed) {
                return;
            }

            try {
                const res = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || 'Xóa sinh viên thất bại.');
                }

                setStatus('Xóa sinh viên thành công.');
                fetchUsers();
            } catch (error) {
                console.error('Lỗi khi xóa sinh viên:', error);
                setStatus(error.message || 'Lỗi khi xóa sinh viên.', true);
            }
        });

        // Chạy khi mở trang
        fetchUsers();
    </script>
</body>

</html>
